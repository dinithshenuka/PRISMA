api_key: YOUR_GROQ_API_KEY_HERE
exclusion_criteria:
- Are not related to clinical or biomedical text
- Do not involve NER or ontology mapping techniques
- Lack evaluation or experimental results
- Are review papers without methodological contributions (unless used for background
  only)
- Are editorials, opinions, or abstracts only
- Are non-English publications
inclusion_criteria:
- Focus on clinical text, electronic health records, or medical documentation
- Involve Named Entity Recognition (NER), entity extraction, or ontology mapping
- Use or evaluate medical ontologies such as SNOMED CT, ICD-10, or ICD-11
- Provide evaluation metrics (e.g., precision, recall, F1-score, accuracy)
- Published in peer-reviewed journals or conferences
- Published between 2020 and 2026
- Written in English
- Studies applicable to Sri Lanka or similar healthcare contexts (resource-constrained
  or South Asian settings)
llm_model: llama-3.1-8b-instant
max_results: 5
project_name: LLM_Productivity_Review
search_queries:
  openalex: ("clinical notes" OR "clinical text" OR "electronic health records" OR
    EHR OR EMR OR "discharge summaries") AND ("named entity recognition" OR NER OR
    "clinical NLP" OR "information extraction" OR "entity extraction")
  pubmed: ("clinical notes" OR "clinical text" OR "electronic health records" OR EHR
    OR EMR OR "discharge summaries") AND ("named entity recognition" OR NER OR "clinical
    NLP" OR "information extraction" OR "entity extraction")
